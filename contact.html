<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | Moksha Mary S</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0f0f0; }
    nav {
      position: fixed; top: 0; width: 100%;
      background: rgba(15,15,15,0.95);
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 60px; border-bottom: 1px solid #222; z-index: 100;
    }
    nav .logo { font-size: 1.4rem; font-weight: 700; color: #a78bfa; }
    nav ul { list-style: none; display: flex; gap: 30px; align-items: center; }
    nav ul a { color: #ccc; text-decoration: none; font-size: 0.95rem; transition: color 0.3s; }
    nav ul a:hover, nav ul a.active { color: #a78bfa; }
    .logout-btn {
      background: transparent; border: 1px solid #a78bfa;
      color: #a78bfa; padding: 8px 18px; border-radius: 8px;
      cursor: pointer; font-size: 0.85rem; transition: all 0.3s;
    }
    .logout-btn:hover { background: #a78bfa; color: #0f0f0f; }
    .page { max-width: 700px; margin: 0 auto; padding: 120px 40px 80px; }
    .page-header { margin-bottom: 50px; }
    .page-header h1 { font-size: 2.5rem; font-weight: 800; }
    .page-header h1 span { color: #a78bfa; }
    .page-header p { color: #666; margin-top: 8px; }
    .divider { width: 60px; height: 4px; background: #a78bfa; border-radius: 2px; margin: 16px 0; }
    .contact-card {
      background: #1a1a2e; border: 1px solid #2d2d4e;
      border-radius: 20px; padding: 40px;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: #aaa; font-size: 0.85rem; }
    .form-group input, .form-group textarea {
      width: 100%; padding: 14px 16px;
      background: #0f0f0f; border: 1px solid #2d2d4e;
      border-radius: 10px; color: #f0f0f0;
      font-size: 1rem; outline: none; transition: border-color 0.3s;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: #a78bfa; }
    .form-group textarea { height: 140px; resize: vertical; font-family: inherit; }
    .btn {
      width: 100%; padding: 14px;
      background: #a78bfa; color: #0f0f0f;
      border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: all 0.3s;
    }
    .btn:hover { background: #8b5cf6; transform: translateY(-2px); }
    .msg {
      margin-top: 16px; text-align: center;
      font-size: 0.9rem; display: none;
      padding: 12px; border-radius: 8px;
    }
    .msg.error { color: #f87171; background: #2d1a1a; display: block; }
    .msg.success { color: #a78bfa; background: #1a1040; display: block; }
    .info-row { display: flex; gap: 16px; margin-bottom: 30px; }
    .info-box {
      flex: 1; background: #0f0f0f; border: 1px solid #2d2d4e;
      border-radius: 12px; padding: 16px; text-align: center;
    }
    .info-box span { font-size: 1.5rem; display: block; margin-bottom: 6px; }
    .info-box p { font-size: 0.8rem; color: #666; }
    footer { text-align: center; padding: 30px; color: #555; font-size: 0.85rem; border-top: 1px solid #1a1a1a; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">Moksha.dev</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="skills.html">Skills</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
      <li><button class="logout-btn" onclick="logout()">Logout</button></li>
    </ul>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1>Contact <span>Me</span></h1>
      <div class="divider"></div>
      <p>I'd love to hear from you!</p>
    </div>

    <div class="info-row">
      <div class="info-box"><span>📍</span><p>Bengaluru, India</p></div>
      <div class="info-box"><span>🎓</span><p>BCA Student</p></div>
      <div class="info-box"><span>💼</span><p>Open to opportunities</p></div>
    </div>

    <div class="contact-card">
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="name" placeholder="Enter your name"/>
      </div>
      <div class="form-group">
        <label>Your Email</label>
        <input type="email" id="email" placeholder="Enter your email"/>
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea id="message" placeholder="Write your message here..."></textarea>
      </div>
      <button class="btn" onclick="sendMessage()">Send Message 🚀</button>
      <p class="msg" id="form-msg"></p>
    </div>
  </div>

  <footer><p>© 2026 Moksha Mary S — Built with 💜 using HTML, CSS, JS & Node.js</p></footer>

  <script>
    if (!sessionStorage.getItem('loggedIn')) window.location.href = 'login.html';
    function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }

    async function sendMessage() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();
      const msg = document.getElementById('form-msg');
      msg.className = 'msg';

      if (!name || !email || !message) {
        msg.textContent = '⚠️ Please fill in all fields.';
        msg.className = 'msg error'; return;
      }
      try {
        const res = await fetch('http://localhost:3000/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, message })
        });
        const data = await res.json();
        if (data.success) {
          msg.textContent = '✅ Message sent! Thank you.';
          msg.className = 'msg success';
          document.getElementById('name').value = '';
          document.getElementById('email').value = '';
          document.getElementById('message').value = '';
        }
      } catch {
        msg.textContent = '❌ Could not connect to server.';
        msg.className = 'msg error';
      }
    }
  </script>
</body>
</html>
