<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | Moksha Mary S</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <nav>
    <div class="logo">Moksha.dev</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="skills.html">Skills</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
      <li><button class="logout-btn" onclick="logout()">Logout</button></li>
    </ul>
  </nav>
  <div class="page">
    <div class="page-header">
      <h1>Contact <span>Me</span></h1>
      <div class="divider"></div>
      <p>I'd love to hear from you!</p>
    </div>
    <div class="info-row">
      <div class="info-box"><span>📍</span><p>Bengaluru, India</p></div>
      <div class="info-box"><span>🎓</span><p>BCA Student</p></div>
      <div class="info-box"><span>💼</span><p>Open to opportunities</p></div>
    </div>
    <div class="contact-card">
      <div class="form-group"><label>Your Name</label><input type="text" id="name" placeholder="Enter your name"/></div>
      <div class="form-group"><label>Your Email</label><input type="email" id="email" placeholder="Enter your email"/></div>
      <div class="form-group"><label>Message</label><textarea id="message" placeholder="Write your message here..."></textarea></div>
      <button class="btn btn-primary" onclick="sendMessage()">Send Message 🚀</button>
      <p class="msg" id="form-msg"></p>
    </div>
  </div>
  <footer><p>© 2026 Moksha Mary S — Built with 💜 using HTML, CSS, JS & Node.js</p></footer>
  <script src="js/main.js"></script>
  <script>checkAuth();</script>
