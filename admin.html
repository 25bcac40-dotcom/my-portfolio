<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin | Messages</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .admin-page { max-width: 900px; margin: 0 auto; padding: 120px 40px 80px; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    .admin-header h1 { font-size: 2rem; font-weight: 800; }
    .admin-header h1 span { color: #a78bfa; }
    .badge { background: #1a1a2e; border: 1px solid #2d2d4e; padding: 6px 16px; border-radius: 50px; font-size: 0.85rem; color: #a78bfa; }
    .messages-table { width: 100%; border-collapse: collapse; }
    .messages-table th { text-align: left; padding: 14px 16px; background: #1a1a2e; color: #a78bfa; font-size: 0.85rem; border-bottom: 1px solid #2d2d4e; }
    .messages-table td { padding: 16px; border-bottom: 1px solid #1a1a1a; font-size: 0.9rem; color: #ccc; vertical-align: top; }
    .messages-table tr:hover td { background: #1a1a2e; }
    .message-text { color: #bbb; line-height: 1.6; max-width: 300px; }
    .date-badge { background: #0f0f0f; border: 1px solid #2d2d4e; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; color: #666; white-space: nowrap; }
    .empty-state { text-align: center; padding: 60px; color: #555; }
    .empty-state span { font-size: 3rem; display: block; margin-bottom: 16px; }
    .loading { text-align: center; padding: 60px; color: #666; }
    .refresh-btn { background: #1a1a2e; border: 1px solid #2d2d4e; color: #a78bfa; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: all 0.3s; }
    .refresh-btn:hover { background: #a78bfa; color: #0f0f0f; }
    .count-badge { background: #a78bfa; color: #0f0f0f; padding: 2px 10px; border-radius: 50px; font-size: 0.8rem; font-weight: 700; margin-left: 8px; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">Moksha.dev</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="skills.html">Skills</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="admin.html" class="active">Admin</a></li>
      <li><button class="logout-btn" onclick="logout()">Logout</button></li>
    </ul>
  </nav>

  <div class="admin-page">
    <div class="admin-header">
      <h1>📬 <span>Messages</span><span class="count-badge" id="count">0</span></h1>
      <button class="refresh-btn" onclick="loadMessages()">🔄 Refresh</button>
    </div>

    <div id="messages-container">
      <div class="loading">Loading messages...</div>
    </div>
  </div>

  <footer><p>© 2026 Moksha Mary S — Admin Panel</p></footer>

  <script src="js/main.js"></script>
  <script>
    checkAuth();

    async function loadMessages() {
      const container = document.getElementById('messages-container');
      container.innerHTML = '<div class="loading">Loading messages...</div>';

      try {
        const res = await fetch('https://mokshamarys-space.onrender.com/contacts');
        const messages = await res.json();

        document.getElementById('count').textContent = messages.length;

        if (messages.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <span>📭</span>
              <p>No messages yet! Share your portfolio and people will reach out.</p>
            </div>`;
          return;
        }

        container.innerHTML = `
          <table class="messages-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Email</th>
                <th>Message</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody>
              ${messages.map(m => `
                <tr>
                  <td>${m.id}</td>
                  <td><strong>${m.name}</strong></td>
                  <td style="color:#a78bfa">${m.email}</td>
                  <td class="message-text">${m.message}</td>
                  <td><span class="date-badge">${new Date(m.created_at).toLocaleString()}</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>`;
      } catch {
        container.innerHTML = '<div class="empty-state"><span>❌</span><p>Could not load messages. Make sure the server is running.</p></div>';
      }
    }

    loadMessages();
  </script>
</body>
</html>
