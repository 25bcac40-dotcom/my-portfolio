<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Moksha Mary S</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-logo">Moksha.dev</div>
    <p class="login-tagline">Welcome! Please login to continue</p>
    <div class="login-card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login', this)">Login</button>
<button class="tab" onclick="switchTab('register', this)">Register</button>
      </div>
      <div class="form-panel active" id="login-panel">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="login-email" placeholder="you@example.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-pass" placeholder="Enter your password"/>
        </div>
        <button class="btn-full" onclick="login()">Login →</button>
        <p class="msg" id="login-msg"></p>
      </div>
      <div class="form-panel" id="register-panel">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="reg-email" placeholder="you@example.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-pass" placeholder="Create a password"/>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="reg-pass2" placeholder="Repeat your password"/>
        </div>
        <button class="btn-full" onclick="register()">Create Account →</button>
        <p class="msg" id="reg-msg"></p>
      </div>
    </div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
